<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wisdom Price Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.6rem; margin-bottom: 2rem; color: #a78bfa; }

    .card {
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }

    .card h2 { font-size: 1rem; margin-bottom: 1rem; color: #a78bfa; }

    label { display: block; font-size: 0.85rem; color: #9ca3af; margin-bottom: 0.3rem; }

    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #3b3b6b;
      border-radius: 6px;
      background: #0f172a;
      color: #e0e0e0;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    input:focus { outline: 2px solid #a78bfa; border-color: transparent; }

    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 0.75rem;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 0.6rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #6d28d9; }
    button:disabled { background: #4b4b6b; cursor: not-allowed; }

    #auth-error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; display: none; }

    #main { display: none; width: 100%; max-width: 600px; }

    .result-box {
      background: #0f172a;
      border: 1px solid #2d2d5e;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      line-height: 1.8;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .result-row {
      padding: 0.3rem 0;
      border-bottom: 1px solid #1e2a4a;
    }

    .result-row:last-child { border-bottom: none; }

    .result-row a { color: #60a5fa; text-decoration: none; }
    .result-row a:hover { text-decoration: underline; }

    .error-msg { color: #f87171; }
    .loading { color: #9ca3af; font-style: italic; }

    .logout-btn {
      background: none;
      border: 1px solid #3b3b6b;
      color: #9ca3af;
      font-size: 0.8rem;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      width: auto;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .logout-btn:hover { background: #2d2d5e; }
  </style>
</head>
<body>

  <h1>Wisdom Price Checker</h1>

  <!-- 認証画面 -->
  <div class="card" id="auth-section">
    <h2>ログイン</h2>
    <label for="password">パスワード</label>
    <input type="password" id="password" placeholder="パスワードを入力" autocomplete="current-password">
    <button id="login-btn">ログイン</button>
    <div id="auth-error">パスワードが正しくありません</div>
  </div>

  <!-- メイン画面 -->
  <div id="main">
    <button class="logout-btn" id="logout-btn">ログアウト</button>

    <!-- カード検索 -->
    <div class="card">
      <h2>カード検索</h2>
      <label for="card-name">カード名（日本語・英語可）</label>
      <input type="text" id="card-name" placeholder="例：稲妻 / Lightning Bolt">

      <div class="row">
        <div>
          <label for="card-shop-count">ショップ数</label>
          <input type="number" id="card-shop-count" value="3" min="1" max="10">
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:0.75rem;">
          <label class="checkbox-label">
            <input type="checkbox" id="card-allow-english">英語版も対象
          </label>
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:0.75rem;">
          <label class="checkbox-label">
            <input type="checkbox" id="card-output-english">英語名で出力
          </label>
        </div>
      </div>

      <button id="card-search-btn">検索</button>
      <div class="result-box" id="card-result"></div>
    </div>

    <!-- デッキ検索 -->
    <div class="card">
      <h2>デッキ検索</h2>
      <label for="deck-url">デッキURL（晴れる屋 / ManaBox / Moxfield）</label>
      <input type="text" id="deck-url" placeholder="例：https://manabox.app/decks/...">

      <div class="row">
        <div>
          <label for="deck-shop-count">ショップ数</label>
          <input type="number" id="deck-shop-count" value="3" min="1" max="10">
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:0.75rem;">
          <label class="checkbox-label">
            <input type="checkbox" id="deck-allow-english">英語版も対象
          </label>
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:0.75rem;">
          <label class="checkbox-label">
            <input type="checkbox" id="deck-output-english">英語名で出力
          </label>
        </div>
      </div>

      <button id="deck-search-btn">検索</button>
      <div class="result-box" id="deck-result"></div>
    </div>
  </div>

  <script>
    // GCP VMのIPアドレスまたはドメインに変更してください
    const API_BASE = "http://136.117.4.50:3000"

    const authSection = document.getElementById("auth-section")
    const mainSection = document.getElementById("main")
    const authError   = document.getElementById("auth-error")

    function getToken() { return sessionStorage.getItem("token") }
    function setToken(t) { sessionStorage.setItem("token", t) }
    function clearToken() { sessionStorage.removeItem("token") }

    function showMain() {
      authSection.style.display = "none"
      mainSection.style.display = "block"
    }

    function showAuth() {
      authSection.style.display = "block"
      mainSection.style.display = "none"
    }

    // 起動時にトークンが残っていれば疎通確認
    async function init() {
      const token = getToken()
      if (!token) return
      const ok = await verifyToken(token)
      if (ok) showMain()
    }

    async function verifyToken(token) {
      try {
        const res = await fetch(`${API_BASE}/api/card?name=Island`, {
          headers: { Authorization: `Bearer ${token}` }
        })
        return res.status !== 401
      } catch {
        return false
      }
    }

    document.getElementById("login-btn").addEventListener("click", async () => {
      const password = document.getElementById("password").value.trim()
      if (!password) return
      authError.style.display = "none"
      const ok = await verifyToken(password)
      if (ok) {
        setToken(password)
        showMain()
      } else {
        authError.style.display = "block"
      }
    })

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("login-btn").click()
    })

    document.getElementById("logout-btn").addEventListener("click", () => {
      clearToken()
      document.getElementById("password").value = ""
      showAuth()
    })

    // カード検索
    document.getElementById("card-search-btn").addEventListener("click", async () => {
      const name         = document.getElementById("card-name").value.trim()
      const shopCount    = document.getElementById("card-shop-count").value
      const allowEnglish = document.getElementById("card-allow-english").checked
      const outputEnglish= document.getElementById("card-output-english").checked
      const resultBox    = document.getElementById("card-result")

      if (!name) return
      resultBox.innerHTML = '<span class="loading">検索中...</span>'
      document.getElementById("card-search-btn").disabled = true

      try {
        const params = new URLSearchParams({ name, shop_count: shopCount, allow_english: allowEnglish, output_english: outputEnglish })
        const res = await fetch(`${API_BASE}/api/card?${params}`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error)
        resultBox.innerHTML = renderRow(data.row)
      } catch (e) {
        resultBox.innerHTML = `<span class="error-msg">${e.message}</span>`
      } finally {
        document.getElementById("card-search-btn").disabled = false
      }
    })

    document.getElementById("card-name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("card-search-btn").click()
    })

    // デッキ検索
    document.getElementById("deck-search-btn").addEventListener("click", async () => {
      const url          = document.getElementById("deck-url").value.trim()
      const shopCount    = document.getElementById("deck-shop-count").value
      const allowEnglish = document.getElementById("deck-allow-english").checked
      const outputEnglish= document.getElementById("deck-output-english").checked
      const resultBox    = document.getElementById("deck-result")

      if (!url) return
      resultBox.innerHTML = '<span class="loading">取得中（デッキ枚数によっては時間がかかります）...</span>'
      document.getElementById("deck-search-btn").disabled = true

      try {
        const params = new URLSearchParams({ url, shop_count: shopCount, allow_english: allowEnglish, output_english: outputEnglish })
        const res = await fetch(`${API_BASE}/api/deck?${params}`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error)
        resultBox.innerHTML = data.list.map(item =>
          `<div class="result-row">${item.error ? `<span class="error-msg">${item.error}</span>` : renderRow(item.row)}</div>`
        ).join("")
      } catch (e) {
        resultBox.innerHTML = `<span class="error-msg">${e.message}</span>`
      } finally {
        document.getElementById("deck-search-btn").disabled = false
      }
    })

    // Markdown リンク [text](url) → <a> タグに変換して表示
    function renderRow(row) {
      return row.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    }

    init()
  </script>
</body>
</html>
